# Auto-capture bibliographic info (incl. BibTeX citation) from a paper link.
# Place at: .github/workflows/autofill.yml
name: Paper autofill

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  autofill:
    # Only run on paper notes (label applied by the issue template)
    if: contains(join(github.event.issue.labels.*.name, ','), 'paper-note')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            // Skip if we already filled this issue (avoid loops on 'edited')
            if (body.includes("<!-- autofilled -->")) {
              core.info("Already autofilled, skipping.");
              return;
            }

            const clean = (s) => (s || "").replace(/\s+/g, " ").trim();

            let meta = null;   // { title, authors[], year, venue, abstract, bibtex }

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            // ---- 1. arXiv --------------------------------------------------
            const ax = body.match(/arxiv\.org\/(?:abs|pdf)\/(\d{4}\.\d{4,5})/i)
                    || body.match(/arXiv:\s*(\d{4}\.\d{4,5})/i);
            if (ax) {
              const id = ax[1];
              // arXiv rate-limits shared IPs (HTTP 429). Send a UA and retry with backoff.
              let xml = "";
              for (let attempt = 1; attempt <= 5; attempt++) {
                const resp = await fetch(
                  `https://export.arxiv.org/api/query?id_list=${id}`,
                  { headers: { "User-Agent": "paper-notes-autofill/1.0 (github-actions; mailto:noreply@example.com)" } }
                );
                if (resp.status === 200) {
                  const text = await resp.text();
                  if (text.includes("<entry>")) { xml = text; break; }
                }
                core.info(`arXiv attempt ${attempt}: status ${resp.status}, retrying in ${attempt * 3}s`);
                await sleep(attempt * 3000);
              }
              if (!xml) {
                core.warning(`arXiv API did not return data for ${id} after retries.`);
              }
              const entry = (xml.split("<entry>")[1] || "");
              const pick = (t) => {
                const m = entry.match(new RegExp(`<${t}[^>]*>([\\s\\S]*?)</${t}>`));
                return m ? clean(m[1]) : "";
              };
              const authors = [...entry.matchAll(/<name>([\s\S]*?)<\/name>/g)]
                                .map(m => clean(m[1]));
              const primaryClass =
                (entry.match(/<arxiv:primary_category[^>]*term="([^"]+)"/) || [])[1] || "";
              const title = pick("title");
              const year  = pick("published").slice(0, 4);

              // Build a BibTeX key: firstauthorlastname + year + firsttitleword
              const lastName  = (authors[0] || "unknown").split(/\s+/).pop();
              const firstWord = (title.split(/\s+/)[0] || "paper").replace(/[^A-Za-z0-9]/g, "");
              const key = `${lastName}${year}${firstWord}`.toLowerCase();
              const bibtex = [
                `@misc{${key},`,
                `  title={${title}},`,
                `  author={${authors.join(" and ")}},`,
                `  year={${year}},`,
                `  eprint={${id}},`,
                `  archivePrefix={arXiv}${primaryClass ? "," : ""}`,
                ...(primaryClass ? [`  primaryClass={${primaryClass}}`] : []),
                `}`,
              ].join("\n");

              meta = {
                title, authors, year,
                venue: pick("arxiv:journal_ref") || "arXiv",
                abstract: pick("summary"),
                bibtex,
              };
            }

            // ---- 2. DOI via Crossref (BibTeX via content negotiation) -----
            if (!meta) {
              const doiM = body.match(/\b10\.\d{4,9}\/[-._;()/:A-Z0-9]+/i);
              if (doiM) {
                const doi = doiM[0].replace(/[.,)]+$/, "");
                const j = await (await fetch(
                  `https://api.crossref.org/works/${encodeURIComponent(doi)}`)).json();
                const m = j.message || {};
                let bibtex = "";
                try {
                  bibtex = clean(await (await fetch(
                    `https://api.crossref.org/works/${encodeURIComponent(doi)}/transform/application/x-bibtex`
                  )).text()).replace(/,\s+/g, ",\n  ");
                } catch (e) { bibtex = ""; }
                meta = {
                  title: clean((m.title || [])[0]),
                  authors: (m.author || []).map(a =>
                    clean(`${a.given || ""} ${a.family || ""}`)),
                  year: String((((m["published-print"] || m["published-online"] || {})
                    ["date-parts"] || [[""]])[0][0]) || ""),
                  venue: clean((m["container-title"] || [])[0]),
                  abstract: clean((m.abstract || "").replace(/<[^>]+>/g, "")),
                  bibtex,
                };
              }
            }

            if (!meta || !meta.title) {
              core.info("No metadata found (unresolved link or API unavailable); nothing to fill.");
              return;
            }

            // ---- 3. Build the bibliography block --------------------------
            const authorStr = meta.authors.length > 3
              ? `${meta.authors.slice(0, 3).join(", ")} et al.`
              : meta.authors.join(", ");
            const biblio = [
              "<!-- autofilled -->",
              "## 📚 Bibliography _(auto-captured)_",
              `- **Title:** ${meta.title}`,
              `- **Authors:** ${authorStr || "—"}`,
              `- **Venue / Year:** ${meta.venue || "—"} ${meta.year || ""}`.trim(),
              "",
              "**Citation (BibTeX):**",
              "```bibtex",
              meta.bibtex || "% not available",
              "```",
              "",
              "<details><summary>Abstract</summary>",
              "",
              meta.abstract || "_(not available)_",
              "",
              "</details>",
              "",
              "---",
              "",
            ].join("\n");

            // ---- 4. Update the issue (title + body) -----------------------
            const placeholder = /\(Paper title\)/i;
            const newTitle = (placeholder.test(issue.title) || !issue.title.trim())
              ? meta.title
              : issue.title;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              title: newTitle,
              body: biblio + body,
            });
            core.info(`Autofilled issue #${issue.number}: ${meta.title}`);
